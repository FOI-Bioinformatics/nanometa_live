[pytest]
# Parallelise across CPU cores by default. The session-scoped test_datasets
# fixture in tests/conftest.py uses filelock to serialise its on-disk
# generator across xdist worker processes, so concurrent workers do not
# corrupt the shared /tmp/nanometa_test_datasets/ tree.
#
# Override with `-n 0` for serial execution (useful when interleaving
# pdb or print debugging across tests) or `-n <N>` for an explicit
# worker count.
#
# loadfile distribution keeps every test file on a single worker; that
# is friendlier to expensive module-scope fixtures than the default
# loadgroup splitter would be.
#
# --strict-markers turns an unregistered marker into an error rather than
# a silent warning, so a typo in @pytest.mark.<name> fails fast.
#
# Coverage is deliberately NOT in addopts: measuring it serialises the
# xdist inner loop and slows the default developer run. Measure on demand
# with the documented invocation instead:
#
#   pytest -p no:xdist --cov=nanometa_live --cov-report=term-missing
addopts = -n auto --dist=loadfile --strict-markers

markers =
    slow: end-to-end test requiring external binaries; not run by default.
    callback: Dash callback unit test (registers callbacks, drives them directly).
    unit: pure-function test with no I/O.
    integration: multi-component test.

# Warning policy: a DeprecationWarning raised from our own package fails the run
# so deprecations (e.g. datetime.utcnow) are fixed at the source rather than
# accumulating silently. Third-party deprecation noise (pandas, dash, plotly,
# etc.) stays a warning so an upstream change does not break our CI.
filterwarnings =
    error::DeprecationWarning:nanometa_live
    default::DeprecationWarning

[coverage:run]
source = nanometa_live
omit =
    */tests/*
    */test_*.py

[coverage:report]
# fail_under is enforced only on coverage runs (pytest --cov ...), not on the
# default fast `pytest` dev loop which does not load coverage. It locks in the
# floor achieved by the coverage work (53% as of the test-suite-improvements
# branch) with a few points of headroom so behaviour-preserving refactors do
# not trip it while a genuine coverage regression still fails the run.
fail_under = 50
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
