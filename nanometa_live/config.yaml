########## Quality and Validation Settings ###################################

## BLAST VALIDATION ##
# Description: Controls the activation of sequence validation using BLAST.
# Note: Enabling validation enhances accuracy but may increase processing time.
# Options: true (enable validation), False (disable validation)
blast_validation: True


## BLAST CUTOFFS ##
# Description: Criteria for sequence validation in BLAST (percent identity and E-value).
# Note: Adjust these values based on the stringency required for your analysis.
# Typical Identity Cutoff: 90-95% for stringent analysis.
# Typical E-value Cutoff: 0.01 or lower for high confidence.
min_perc_identity: 90
e_val_cutoff: 0.01

########## Advanced/Optional Settings ########################################

## PACKAGE MANAGEMENT ##
# Description: Settings for managing pipeline dependencies (deprecated - kept for compatibility).
# Note: Package management is now handled by Nextflow/nf-core modules.
# Options: None (default - assumes all applications are installed)
local_package_management: None
conda_frontend: "mamba"

## PIPELINE PROFILE ##
# Description: Nextflow execution profile controlling how tools are run.
# Options: "docker", "singularity", "conda"
# Default: "docker"
pipeline_profile: "docker"

## QC TOOL ##
# Description: Quality control tool used for read filtering.
# Options: "chopper", "fastp"
# Default: "chopper"
qc_tool: "chopper"

## REMOVE TEMP FILES ##
# Description: Option to remove temporary files created during workflow execution.
# Note: Keeping temporary files can be useful for debugging but may consume significant disk space.
# Options: "true" (remove files), "false" (keep files)
remove_temp_files: True

## PROJECT MAIN DIRECTORY ##
# Description: The primary directory for the project, automatically set during project creation.
# Note: Changing this path after project creation can lead to data misplacement or loss.
# Typically set as an absolute path.
# Example: "/path/to/project/main_directory"
main_dir: "/Users/andreassjodin/Desktop/claude-team/results"

## PIPELINE SOURCE ##
# Description: Controls where the nanometanf pipeline is loaded from.
# Options:
#   - "remote:main" - GitHub repo with main branch (default, stable)
#   - "remote:dev" - GitHub repo with dev branch
#   - "local:/path/to/pipeline" - Local directory (for development)
# Default: "remote:main"
pipeline_source: "local:/Users/andreassjodin/Code/nanometanf"

########## Watchlist Configuration #############################################
watchlist:
  enabled: true
  taxonomy_mode: "auto"
  builtin:
    - "clinical_pathogens"