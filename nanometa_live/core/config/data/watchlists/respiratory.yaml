# Respiratory Pathogens Watchlist
# Pathogens associated with respiratory infections

version: "2.0"
taxonomy_support: ["ncbi", "gtdb"]

metadata:
  name: "Respiratory Pathogens"
  description: "Pathogens associated with respiratory infections and pneumonia"
  source: "Clinical/Respiratory"
  reference: "Respiratory pathogen surveillance"

pathogens:
  - name: "Mycobacterium tuberculosis"
    names_alt: ["Mycobacterium_tuberculosis"]
    taxid_ncbi: 1773
    common_name: "Tuberculosis"
    threat_level: "high"
    bsl_level: 3
    category: "Respiratory"
    alert_threshold: 10
    action_required: "Airborne precautions. TB reporting required. Contact public health."
    notes: "Leading infectious disease killer globally. Drug resistance concern."

  - name: "Streptococcus pneumoniae"
    names_alt: ["Streptococcus_pneumoniae"]
    taxid_ncbi: 1313
    common_name: "Pneumococcus"
    threat_level: "moderate"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 20
    action_required: "Respiratory pathogen assessment. Vaccine-preventable."
    notes: "Leading cause of community-acquired pneumonia and meningitis."

  - name: "Haemophilus influenzae"
    names_alt: ["Haemophilus_influenzae"]
    taxid_ncbi: 727
    common_name: "H. influenzae"
    threat_level: "moderate"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 25
    action_required: "Respiratory pathogen assessment."
    notes: "Type b (Hib) is vaccine-preventable. Non-typeable strains common."

  - name: "Moraxella catarrhalis"
    names_alt: ["Moraxella_catarrhalis"]
    taxid_ncbi: 480
    common_name: "M. catarrhalis"
    threat_level: "low"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 50
    action_required: "Assess for respiratory infection."
    notes: "Common cause of otitis media and exacerbations of COPD."

  - name: "Bordetella pertussis"
    names_alt: ["Bordetella_pertussis"]
    taxid_ncbi: 520
    common_name: "Whooping cough"
    threat_level: "high"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 10
    action_required: "Report to public health. Droplet precautions. Contact tracing."
    notes: "Vaccine-preventable. Resurgence in some populations."

  - name: "Mycoplasma pneumoniae"
    names_alt: ["Mycoplasma_pneumoniae"]
    taxid_ncbi: 2104
    common_name: "Walking pneumonia"
    threat_level: "moderate"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 25
    action_required: "Assess for atypical pneumonia. Consider macrolide therapy."
    notes: "Atypical pneumonia. Common in young adults."

  - name: "Chlamydia pneumoniae"
    names_alt: ["Chlamydia_pneumoniae", "Chlamydophila_pneumoniae"]
    taxid_ncbi: 83558
    common_name: "C. pneumoniae"
    threat_level: "moderate"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 25
    action_required: "Assess for atypical pneumonia."
    notes: "Atypical pneumonia pathogen. Often mild disease."

  - name: "Legionella pneumophila"
    names_alt: ["Legionella_pneumophila"]
    taxid_ncbi: 446
    common_name: "Legionnaires disease"
    threat_level: "high"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 10
    action_required: "Report to public health. Water system assessment."
    notes: "Environmental pathogen. Associated with cooling towers and plumbing."

  - name: "Klebsiella pneumoniae"
    names_alt: ["Klebsiella_pneumoniae"]
    taxid_ncbi: 573
    common_name: "K. pneumoniae"
    threat_level: "high"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 15
    action_required: "Monitor for carbapenem resistance."
    notes: "Healthcare-associated pneumonia. Rising resistance."

  - name: "Pseudomonas aeruginosa"
    names_alt: ["Pseudomonas_aeruginosa"]
    taxid_ncbi: 287
    common_name: "P. aeruginosa"
    threat_level: "high"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 15
    action_required: "Assess for CF or ventilator-associated pneumonia."
    notes: "Common in CF patients and ventilator-associated pneumonia."

  - name: "Mycobacterium avium"
    names_alt: ["Mycobacterium_avium"]
    taxid_ncbi: 1764
    common_name: "MAC"
    threat_level: "moderate"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 20
    action_required: "Assess immunocompromised status. Environmental source investigation."
    notes: "Opportunistic mycobacteria. MAC complex infections."

  - name: "Coccidioides immitis"
    names_alt: ["Coccidioides_immitis"]
    taxid_ncbi: 5501
    common_name: "Valley fever"
    threat_level: "high"
    bsl_level: 3
    category: "Respiratory"
    alert_threshold: 10
    action_required: "Endemic area assessment. Antifungal consideration."
    notes: "Dimorphic fungus. Endemic to southwestern US and parts of Central/South America."

  - name: "Histoplasma capsulatum"
    names_alt: ["Histoplasma_capsulatum"]
    taxid_ncbi: 5037
    common_name: "Histoplasmosis"
    threat_level: "high"
    bsl_level: 3
    category: "Respiratory"
    alert_threshold: 10
    action_required: "Endemic area assessment. Bird/bat exposure history."
    notes: "Dimorphic fungus. Endemic to Ohio and Mississippi River valleys."

  - name: "Aspergillus fumigatus"
    names_alt: ["Aspergillus_fumigatus"]
    taxid_ncbi: 746128
    common_name: "Aspergillosis"
    threat_level: "high"
    bsl_level: 2
    category: "Respiratory"
    alert_threshold: 15
    action_required: "Assess immunocompromised status. Environmental mold assessment."
    notes: "Opportunistic mold. Invasive aspergillosis in immunocompromised."
