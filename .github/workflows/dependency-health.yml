name: Dependency health

# Quarterly dependency check (plus manual trigger). Surfaces end-of-life core
# dependencies, outdated packages, and known CVEs so they are noticed on a
# cadence rather than the next time something breaks. The EOL check fails the
# run (red build -> notification) when a monitored series is end-of-life; the
# outdated/audit steps are informational.

on:
  schedule:
    # 06:00 UTC on the 1st of Jan, Apr, Jul, Oct (quarterly).
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch: {}

concurrency:
  group: dependency-health
  cancel-in-progress: true

jobs:
  dependency-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: End-of-life check (fails on EOL series)
        run: python scripts/check_dependency_eol.py

      - name: Outdated packages (informational)
        if: always()
        run: pip list --outdated || true

      - name: Security audit (informational)
        if: always()
        run: |
          pip install pip-audit
          pip-audit || true
