name: Tests

# Runs the pytest suite (with the coverage gate) on every push to the main
# development branches and on every PR targeting them. The fast tier only --
# tests marked `slow` need Nextflow/conda/datasets and are skipped here; cover
# those separately on a self-hosted/scheduled runner if needed.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        # requirements.txt carries dash/plotly/pandas/etc.; [dev] adds
        # pytest, pytest-xdist, pytest-cov and filelock. No conda needed --
        # the suite is pip-installable (Nextflow-dependent tests are `slow`).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite with coverage
        # addopts in pytest.ini supplies `-n auto --dist=loadfile
        # --strict-markers`; pytest-cov combines the per-worker coverage and
        # enforces the fail_under floor from pytest.ini's [coverage:report].
        run: |
          pytest --cov=nanometa_live --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
