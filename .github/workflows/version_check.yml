name: Version Check

on:
  pull_request:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install nanometa
      run: |
        pip install .

    - name: Check nanometa-live version
      run: nanometa-live --version

    # nanometa-sim is deprecated (superseded by nanorunner).
    # The entry point now prints a deprecation notice and exits with code 1.
    - name: Verify nanometa-sim deprecation notice
      run: |
        nanometa-sim 2>&1 || true

    - name: Check nanometa-prepare version
      run: nanometa-prepare --version
