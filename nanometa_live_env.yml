# The main conda environment for Nanometa Live.
# Installation instructions in readme on github.

name: nanometa_live_env
channels:
  - conda-forge
  - bioconda
channel_priority: strict
dependencies:
  - python >=3.11.0
  - dash >=2.18.2
  - dash-daq >=0.6.0
  - dash-bootstrap-components >=1.7.1
  - plotly >=6.0.0
  - numpy >=1.24.1
  - pandas >=2.2.3
  - pyyaml >=6.0
  - pytest >=7.2.1
  - tqdm >=4.67.1
  - snakemake-minimal >=8.30.0
  - setuptools >=67.6.0
  - pip >=23.0.1
  - blast >=2.16.0
  - biopython >=1.85
  - gzip >=1.10
  - kraken2 >=2.1.4
  - fastp >=0.23.2
  - ruamel.yaml >=0.18.10
  - ncbi-datasets-cli >=17.1.0
  - pyfastx >=2.2.0
  - flask >=3.1.0
  - scipy >=1.10.0
  - requests >=2.32.3